name: Publish Plugin

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew :graph-database-plugin:buildPlugin

      - name: Sign plugin
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_CERTIFICATE_CHAIN: ${{ secrets.SIGNING_CERTIFICATE_CHAIN }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :graph-database-plugin:signPlugin

      - name: Publish plugin
        env:
          INTELLIJ_TOKEN: ${{ secrets.INTELLIJ_TOKEN }}
        run: ./gradlew :graph-database-plugin:publishPlugin